<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency SOS System</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #f44336; padding: 10px; text-align: center; color: white; }
        #map { height: 400px; width: 100%; }
        #alert { display: none; background: #ffcc00; padding: 10px; margin: 10px; }
        #alert.error { background: #ff6b6b; color: #fff; }
        .container { padding: 20px; }
        button.sos { background: green; color: white; padding: 10px 20px; font-size: 20px; border: none; cursor: pointer; }
        button.sos:disabled { background: #9e9e9e; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <h1>Emergency SOS System</h1>
    </header>
    <div class="container">
        <button class="sos" id="sosButton">SOS</button>
        <div id="map"></div>
        <div id="alert" role="status" aria-live="polite">Alert sent! Help is on the way!</div>
        <section>
            <h2>Features</h2>
            <ul>
                <li>Real-time location tracking</li>
                <li>Instant alerts to emergency contacts</li>
                <li>Live map integration</li>
            </ul>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
